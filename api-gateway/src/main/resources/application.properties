spring.application.name=api-gateway
server.port=${PORT:${SERVER_PORT:8080}}

logging.level.org.springframework.cloud.gateway=DEBUG

# Static routing to local Docker service hostnames
spring.cloud.gateway.discovery.locator.enabled=false
services.usuarios.url=${USUARIOS_SERVICE_URL:http://ms-usuarios:8084}
services.reportes.url=${REPORTES_SERVICE_URL:http://ms-reportes:8081}
services.geolocalizacion.url=${GEOLOCALIZACION_SERVICE_URL:http://ms-geolocalizacion:8083}
services.alertas.url=${ALERTAS_SERVICE_URL:http://ms-alertas:8082}

eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
