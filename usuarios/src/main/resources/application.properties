spring.config.import=optional:file:${user.dir}/.env[.properties],optional:file:${user.dir}/../.env[.properties]

spring.application.name=ms-usuarios
server.port=${PORT:${SERVER_PORT:${USUARIOS_PORT:8084}}}

spring.datasource.url=${USUARIOS_DB_URL:${DB_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:6543/postgres?currentSchema=usuarios_db&sslmode=require&prepareThreshold=0}}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}
spring.datasource.username=${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:postgres.zlrmlowutfrpphutjvre}}
spring.datasource.password=${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.default_schema=usuarios_db
spring.jpa.properties.hibernate.format_sql=true

spring.cloud.client.discovery.enabled=${SPRING_CLOUD_DISCOVERY_ENABLED:false}
spring.cloud.netflix.eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:${EUREKA_PORT:8762}/eureka/}
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
eureka.client.register-with-eureka=${EUREKA_CLIENT_REGISTER_WITH_EUREKA:false}
eureka.client.fetch-registry=${EUREKA_CLIENT_FETCH_REGISTRY:false}

# Gmail SMTP (usar contraseña de aplicación: https://myaccount.google.com/apppasswords)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8
