spring.config.import=optional:file:${user.dir}/.env[.properties],optional:file:${user.dir}/../.env[.properties]

spring.application.name=ms-reportes
server.port=${PORT:${SERVER_PORT:${REPORTES_PORT:8081}}}

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:${EUREKA_PORT:8762}/eureka/}
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
eureka.client.register-with-eureka=${EUREKA_CLIENT_REGISTER_WITH_EUREKA:false}
eureka.client.fetch-registry=${EUREKA_CLIENT_FETCH_REGISTRY:false}
spring.cloud.client.discovery.enabled=${SPRING_CLOUD_DISCOVERY_ENABLED:false}

spring.datasource.url=${REPORTES_DB_URL:${DB_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:6543/postgres?currentSchema=reports_db&sslmode=require&prepareThreshold=0}}}
spring.datasource.username=${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:postgres.zlrmlowutfrpphutjvre}}
spring.datasource.password=${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.default_schema=reports_db
spring.jpa.show-sql=true

# --- OpenAPI / Swagger UI (SpringDoc) ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.writer-with-default-pretty-printer=true
springdoc.show-actuator=false
